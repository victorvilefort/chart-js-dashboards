<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div>
        <canvas id="myChart" style="position: relative; width: 80vw; height: 40vh;"></canvas>
    </div>

    <div>

</body>

<script>
    let labels = ['12:00', 
    '13:00', 
    '14:00', 
    '15:00', 
    '16:00', 
    '17:00'];

    let temperatura = {
        labels: labels,
        datasets: [{
            label: 'Temperatura',
            backgroundColor: 'rgb(255, 99, 132)',
            borderColor: 'rgb(255, 99, 132)',
            data: [30, 29, 28, 25, 22, 23,],
        }]
    };

    let umidade = {
        labels: labels,
        datasets: [{
            label: 'Umidade',
            backgroundColor: 'rgb(54, 162, 235)',
            borderColor: 'rgb(54, 162, 235)',
            data: [80, 82, 80, 85, 80, 83],
        }]
    };

     let data = {
        labels: labels,
        datasets: [
            temperatura.datasets[0],
            umidade.datasets[0]
        ]
    };

    let config = {
        type: 'line',
        data: data,
        options: {}
    };

</script>

<script>

        let data2 = {

</script>



<script>
    let myChart = new Chart(
        document.getElementById('myChart'),
        config
    );

    let myChart2 = new Chart(
